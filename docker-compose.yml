version: '3.9'

# FreeLang Hybrid Docker Compose Configuration
# =============================================
# 사용법:
#   docker-compose up -d              # 백그라운드 실행
#   docker-compose logs -f            # 로그 보기
#   docker-compose down               # 중지 및 정리
#   docker-compose ps                 # 상태 확인

services:
  # ==================== FreeLang Hybrid API ====================
  api:
    # 이미지 설정
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - FREELANG_VERSION=2.8.0
        - NODEJS_VERSION=25
        - BUILD_DATE=${BUILD_DATE:-2026-03-12}
        - VCS_REF=${VCS_REF:-main}

    image: freelang-hybrid:latest
    container_name: freelang-hybrid-api

    # 포트 매핑
    ports:
      - "3000:3000"  # 웹 서버 (정적 파일)
      - "3001:3001"  # API 서버

    # 환경 변수
    environment:
      - NODE_ENV=production
      - PORT=3001
      - WEB_PORT=3000
      - LOG_LEVEL=info
      - CORS_ORIGIN=*
      - LANGUAGE=ko-KR

    # 볼륨 마운트
    volumes:
      - ./data:/app/data                    # 데이터 영속성
      - ./static:/app/static                # 웹 페이지
      - ./freelang:/app/freelang            # FreeLang 소스
      - ./backend:/app/backend              # 백엔드 코드
      - /app/node_modules                   # node_modules 제외 (읽기 전용)

    # 리스타트 정책
    restart: unless-stopped

    # 헬스 체크
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

    # 리소스 제한
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M

    # 로깅
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        labels: "service=freelang-api"

    # 네트워크 설정
    networks:
      - freelang-network

    # 의존성 (필요시)
    depends_on: []

    # 보안 설정
    security_opt:
      - no-new-privileges:true

    # 호스트명
    hostname: freelang-api

    # 초기화 스크립트 실행
    entrypoint: /app/docker-entrypoint.sh
    command: node backend/server.js

  # ==================== Reverse Proxy (선택사항) ====================
  nginx:
    image: nginx:alpine
    container_name: freelang-hybrid-nginx

    # 포트 매핑
    ports:
      - "80:80"
      - "443:443"

    # 설정 파일
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro

    # 네트워크
    networks:
      - freelang-network

    # API 의존
    depends_on:
      - api

    # 리스타트
    restart: unless-stopped

    # 헬스 체크
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

    # 프로필 (필요시만 실행)
    profiles:
      - nginx

  # ==================== PostgreSQL Database (선택사항) ====================
  postgres:
    image: postgres:16-alpine
    container_name: freelang-hybrid-db

    # 환경 변수
    environment:
      - POSTGRES_DB=freelang
      - POSTGRES_USER=freelang
      - POSTGRES_PASSWORD=freelang123
      - POSTGRES_INITDB_ARGS=-c shared_buffers=256MB -c max_connections=200

    # 포트 매핑
    ports:
      - "5432:5432"

    # 볼륨 (영속성)
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres-init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro

    # 네트워크
    networks:
      - freelang-network

    # 헬스 체크
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U freelang"]
      interval: 10s
      timeout: 5s
      retries: 5

    # 리스타트
    restart: unless-stopped

    # 프로필 (필요시만 실행)
    profiles:
      - db

  # ==================== Redis Cache (선택사항) ====================
  redis:
    image: redis:7-alpine
    container_name: freelang-hybrid-cache

    # 포트 매핑
    ports:
      - "6379:6379"

    # 명령어 (AOF 활성화)
    command: redis-server --appendonly yes

    # 볼륨
    volumes:
      - redis-data:/data

    # 네트워크
    networks:
      - freelang-network

    # 헬스 체크
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

    # 리스타트
    restart: unless-stopped

    # 프로필
    profiles:
      - cache

  # ==================== Monitoring (선택사항) ====================
  prometheus:
    image: prom/prometheus:latest
    container_name: freelang-hybrid-prometheus

    # 포트 매핑
    ports:
      - "9090:9090"

    # 설정 파일
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus

    # 명령어
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'

    # 네트워크
    networks:
      - freelang-network

    # 리스타트
    restart: unless-stopped

    # 프로필
    profiles:
      - monitoring

# ==================== 네트워크 ====================
networks:
  freelang-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

# ==================== 볼륨 ====================
volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local
  prometheus-data:
    driver: local
