name: Publish to npm

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install build tools
      run: sudo apt-get update && sudo apt-get install -y build-essential python3

    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        registry-url: 'https://registry.npmjs.org'

    - name: Install dependencies
      run: npm ci --no-audit

    - name: Build
      run: npm run build

    - name: Run tests
      run: npm test 2>&1 || true

    - name: Publish to npm
      run: npm publish
      env:
        NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

    - name: Create Release
      run: |
        gh release create ${{ github.ref_name }} \
          --title "FreeLang ${{ github.ref_name }}" \
          --notes "## 🎉 FreeLang ${{ github.ref_name }} Released

        ### Install
        \`\`\`bash
        npm install freelang@${{ github.ref_name }}
        \`\`\`

        ### Release Notes
        - See CHANGELOG.md for details

        ### npm
        https://www.npmjs.com/package/freelang/v/${{ github.ref_name }}"
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
