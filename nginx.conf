# FreeLang Light - nginx Reverse Proxy + SSL Configuration
# ==================================================================
# HTTPS 종료 + FreeLang API 프록시
# Let's Encrypt와 certbot 사용

# 업스트림 정의
upstream freelang_backend {
    server freelang-blog:5021;  # Docker Compose 내부 DNS
}

# HTTP → HTTPS 리다이렉트
server {
    listen 80;
    server_name 253.dclub.kr;

    # Let's Encrypt 인증서 갱신 경로
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # 모든 HTTP 요청을 HTTPS로 리다이렉트
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS 서버
server {
    listen 443 ssl http2;
    server_name 253.dclub.kr;

    # SSL 인증서 경로
    ssl_certificate /etc/letsencrypt/live/253.dclub.kr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/253.dclub.kr/privkey.pem;

    # SSL 설정 (현대적, 보안 강화)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # HSTS (HTTP Strict-Transport-Security)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # 접근 로그
    access_log /var/log/nginx/freelang_access.log;
    error_log /var/log/nginx/freelang_error.log;

    # 본문 크기 제한
    client_max_body_size 50M;

    # 타임아웃 설정
    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;

    # 프록시 설정
    location / {
        proxy_pass http://freelang_backend;

        # 요청 헤더 전달
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $server_name;
        proxy_set_header Connection "upgrade";
        proxy_set_header Upgrade $http_upgrade;

        # WebSocket 지원
        proxy_http_version 1.1;

        # 캐싱 설정 (정적 파일만)
        proxy_cache_bypass $http_upgrade;
    }

    # 정적 파일 캐싱 (HTML, CSS, JS, 이미지)
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
        proxy_pass http://freelang_backend;
        proxy_cache_valid 200 30d;
        add_header Cache-Control "public, max-age=2592000";
    }

    # health check 엔드포인트 (모니터링용)
    location /api/health {
        proxy_pass http://freelang_backend;
        access_log off;
    }
}

# 추가 보안 설정
server_tokens off;
